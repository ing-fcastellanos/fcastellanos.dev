<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Profile photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf1ea"/>
      <stop offset="1" stop-color="#dbeee4"/>
    </linearGradient>
    <clipPath id="round"><rect width="400" height="400" rx="28"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <!-- subtle grid, echoes the site's blueprint band -->
    <g stroke="#cfe0d4" stroke-width="1" opacity="0.6">
      <path d="M0 100H400M0 200H400M0 300H400M100 0V400M200 0V400M300 0V400"/>
    </g>
    <!-- silhouette -->
    <circle cx="200" cy="158" r="60" fill="#2FB380" opacity="0.85"/>
    <path d="M96 330c0-57 47-100 104-100s104 43 104 100v40H96z" fill="#2FB380" opacity="0.85"/>
    <!-- mono caption -->
    <text x="200" y="384" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="17" fill="#1f8f66" opacity="0.9">add photo</text>
  </g>
  <rect x="0.5" y="0.5" width="399" height="399" rx="28" fill="none" stroke="#c2cabb"/>
</svg>
