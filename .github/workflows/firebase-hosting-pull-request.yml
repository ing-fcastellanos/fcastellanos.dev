# Deploy a temporary preview channel for each PR (same-repo branches only).
# Keyless auth via Google Cloud Workload Identity Federation (WIF).
# One-time setup: see docs/ci-firebase-wif.md
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  contents: read
  id-token: write          # required for WIF / OIDC
  pull-requests: write     # to post the preview URL as a comment
jobs:
  preview:
    # Skip fork PRs and Dependabot — neither can obtain the OIDC token for WIF.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install -g firebase-tools
      - name: Deploy preview channel
        run: firebase hosting:channel:deploy "pr-${{ github.event.number }}" --project fcastellanos-info --expires 7d --non-interactive
