# Deploy to Firebase Hosting (live) on merge to main.
# Keyless auth via Google Cloud Workload Identity Federation (WIF).
# One-time setup: see docs/ci-firebase-wif.md
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write          # required for WIF / OIDC
jobs:
  deploy_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g firebase-tools
      - name: Deploy to live channel
        run: firebase deploy --only hosting --project fcastellanos-info --non-interactive
